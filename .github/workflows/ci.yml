name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Prevent concurrent deploys — queue them instead of cancelling
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─── Job 1: Test ────────────────────────────────────────────────────────────
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # ── API ──
      - name: Setup Node (API)
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/api/package-lock.json

      - name: Install API deps
        working-directory: apps/api
        run: npm ci

      - name: Lint API
        working-directory: apps/api
        run: npm run lint

      - name: Test API
        working-directory: apps/api
        run: npm test -- --passWithNoTests

      # ── UI ──
      - name: Setup Node (UI)
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/ui/package-lock.json

      - name: Install UI deps
        working-directory: apps/ui
        run: npm ci

      - name: Lint UI
        working-directory: apps/ui
        run: npm run lint

      - name: Build UI (validates compilation)
        working-directory: apps/ui
        run: npm run build -- --configuration production

  # ─── Job 2: Deploy to production ────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    # Uses the "production" GitHub Environment — enables required reviewers
    # and environment-scoped secrets (Settings → Environments → production)
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17 # v1.2.0
        env:
          # Secrets — forwarded to the SSH session via envs: below
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Non-sensitive config — stored as GitHub Variables (not Secrets)
          FRONTEND_URL: ${{ vars.FRONTEND_URL }}
          GOOGLE_CALLBACK_URL: ${{ vars.GOOGLE_CALLBACK_URL }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: JWT_SECRET,JWT_REFRESH_SECRET,GROQ_API_KEY,RESEND_API_KEY,EMAIL_FROM,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,ANTHROPIC_API_KEY,FRONTEND_URL,GOOGLE_CALLBACK_URL
          # Generous timeout — docker compose build takes a few minutes on a VPS
          command_timeout: 10m
          script: |
            set +x   # never echo commands — prevents secrets leaking into logs
            mkdir -p /opt/jobhunt/db

            # ── Pull latest code ──
            cd /opt/jobhunt/repo
            git pull

            # ── Write .env atomically (safe for special chars in secrets) ──
            {
              printf 'NODE_ENV=production\n'
              printf 'PORT=3000\n'
              printf 'DB_PATH=/data/db/jobhunt.db\n'
              printf 'FRONTEND_URL=%s\n'         "$FRONTEND_URL"
              printf 'JWT_SECRET=%s\n'           "$JWT_SECRET"
              printf 'JWT_EXPIRY=15m\n'
              printf 'JWT_REFRESH_SECRET=%s\n'   "$JWT_REFRESH_SECRET"
              printf 'REFRESH_TOKEN_EXPIRY_DAYS=7\n'
              printf 'GROQ_API_KEY=%s\n'         "$GROQ_API_KEY"
              printf 'RESEND_API_KEY=%s\n'       "$RESEND_API_KEY"
              printf 'EMAIL_FROM=%s\n'           "$EMAIL_FROM"
              printf 'GOOGLE_CLIENT_ID=%s\n'     "$GOOGLE_CLIENT_ID"
              printf 'GOOGLE_CLIENT_SECRET=%s\n' "$GOOGLE_CLIENT_SECRET"
              printf 'ANTHROPIC_API_KEY=%s\n'    "$ANTHROPIC_API_KEY"
              printf 'GOOGLE_CALLBACK_URL=%s\n'  "$GOOGLE_CALLBACK_URL"
            } > .env.tmp

            mv .env.tmp .env
            chmod 600 .env   # readable only by the deploy user

            # ── Stop old container (frees port 3000) then rebuild and start ──
            sudo docker compose down
            sudo docker compose up -d --build --remove-orphans

            # ── Clean up dangling images to save disk space ──
            sudo docker image prune -f
