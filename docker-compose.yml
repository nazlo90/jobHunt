services:
  jobhunt:
    build: .
    image: jobhunt:latest
    ports:
      - "3000:3000"
    volumes:
      # SQLite database — persisted on the host at /opt/jobhunt/db
      - /opt/jobhunt/db:/data/db
    environment:
      NODE_ENV: production
      PORT: "3000"
      DB_PATH: /data/db/jobhunt.db
      FRONTEND_URL: ${FRONTEND_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY: ${JWT_EXPIRY:-15m}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      REFRESH_TOKEN_EXPIRY_DAYS: ${REFRESH_TOKEN_EXPIRY_DAYS:-7}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      BREVO_SMTP_USER: ${BREVO_SMTP_USER:-}
      BREVO_SMTP_PASS: ${BREVO_SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/jobs/stats"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
